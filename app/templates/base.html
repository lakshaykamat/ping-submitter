<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Ping MVP" }}</title>
    {% block head %}{% endblock %}
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen overflow-x-hidden bg-zinc-50 text-zinc-950">
    <header class="border-b border-zinc-200 bg-white">
      <nav class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
        <a href="/" class="text-sm font-semibold tracking-wide text-zinc-950">Ping MVP</a>
        <div class="flex items-center gap-2 text-sm">
          <a href="/" class="rounded-md px-3 py-2 text-zinc-700 hover:bg-zinc-100 hover:text-zinc-950">Dashboard</a>
          <a href="/health" class="rounded-md px-3 py-2 text-zinc-700 hover:bg-zinc-100 hover:text-zinc-950">Health</a>
        </div>
      </nav>
    </header>
    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
